[tox]
envlist = py3{10,11,12,13,14,14t},black,pylint

[testenv]
pip_pre = True
passenv =
  CFLAGS
  CPPFLAGS
  INCLUDE
  LDFLAGS
  LIB
deps =
  build
  setuptools >= 74.1.0
  wheel
commands =
  python -m build --no-isolation --outdir=dist --wheel
  python -m pip install --no-index --find-links=dist pytsk3
  python run_tests.py

[testenv:black]
skipsdist = True
pip_pre = True
passenv =
  CFLAGS
  CPPFLAGS
  LDFLAGS
setenv =
  PYTHONPATH = {toxinidir}
deps =
  black
  setuptools >= 74.1.0
commands =
  black --version
  black .

[testenv:pylint]
skipsdist = True
pip_pre = True
passenv =
  CFLAGS
  CPPFLAGS
  LDFLAGS
setenv =
  PYTHONPATH = {toxinidir}
deps =
  pylint >= 3.3.0, < 3.4.0
  setuptools >= 74.1.0
commands =
  pylint --version
  pylint --rcfile=.pylintrc *.py tests utils
