name: build
on: [push, pull_request]
permissions: read-all
jobs:
  build_macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
        - python-version: '3.14'
          toxenv: 'py314'
        - python-version: '3.14t'
          toxenv: 'py314t'
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install build dependencies
      run: |
        brew update -q
        brew install -q autoconf automake gettext gnu-sed libtool pkgconfig tox
        # Keep the GIL python@3.14 brew install only on the GIL matrix
        # entry; setup-python already supplies the interpreter that the
        # build will use, but the brew python preserves prior behavior.
        if [[ "${{ matrix.python-version }}" != *t ]]; then
          brew install -q python@${{ matrix.python-version }}
        fi
        brew link --force gettext
        ln -s /usr/local/bin/glibtoolize /usr/local/bin/libtoolize
        python3 -m pip install setuptools
    - name: Build and test Python module
      run: |
        python setup.py update
        export CXXFLAGS="-std=c++14"
        python setup.py build
        tox -e${{ matrix.toxenv }}
  build_ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - python-version: '3.10'
          toxenv: 'py310'
        - python-version: '3.11'
          toxenv: 'py311'
        - python-version: '3.12'
          toxenv: 'py312'
        - python-version: '3.13'
          toxenv: 'py313'
        - python-version: '3.14'
          toxenv: 'py314'
        - python-version: '3.14t'
          toxenv: 'py314t'
    steps:
    - uses: actions/checkout@v4
    # actions/setup-python ships full Python builds including headers
    # for both stock and free-threaded variants ('3.14t'). The previous
    # deadsnakes-based install of python3.14-nogil omitted Python.h
    # because the PPA ships nogil as a monolithic package without -dev.
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake autopoint \
          autotools-dev build-essential git libtool pkg-config
    - name: Install tox
      run: |
        python -m pip install tox
    - name: Build and test Python module
      run: |
        python setup.py update
        python setup.py build
        tox -e${{ matrix.toxenv }}
  build_windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.14', '3.14t']
        architecture: ['x86', 'x64']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install build dependencies
      run: |
        python3 -m pip install setuptools
    - name: Build Python module
      run: |
        python setup.py update
        python setup.py build
        python setup.py install
    - name: Test Python module
      run: |
        python run_tests.py
