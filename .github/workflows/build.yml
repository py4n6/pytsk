name: build
on:
  pull_request:
  push:
permissions: read-all
jobs:
  build_macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
        - python-version: '3.14'
          toxenv: 'py314'
        - python-version: '3.14t'
          toxenv: 'py314t'
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install build dependencies
      run: |
        brew update -q
        brew install -q autoconf automake gettext gnu-sed libtool pkgconfig tox || true
        # There currently is no brew formula for free-threaded Python, but setup-python will install it if necessary.
        if [[ "${{ matrix.python-version }}" != *t ]]; then
          brew install -q python@${{ matrix.python-version }}
        fi
        ln -s /usr/local/bin/glibtoolize /usr/local/bin/libtoolize
    - name: Build and test Python module
      run: |
        python utils/update_source.py
        export CXXFLAGS="-std=c++14"
        tox -e ${{ matrix.toxenv }}
  build_ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - python-version: '3.10'
          toxenv: 'py310'
        - python-version: '3.11'
          toxenv: 'py311'
        - python-version: '3.12'
          toxenv: 'py312'
        - python-version: '3.13'
          toxenv: 'py313'
        - python-version: '3.14'
          toxenv: 'py314'
        - python-version: '3.14t'
          toxenv: 'py314t'
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake autopoint autotools-dev build-essential git libtool pkg-config
    - name: Install tox
      run: |
        python -m pip install tox
    - name: Build and test Python module
      run: |
        python utils/update_source.py
        tox -e ${{ matrix.toxenv }}
  build_windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.14', '3.14t']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install build dependencies
      run: |
        python3 -m pip install build setuptools wheel
    - name: Build Python module
      run: |
        python utils/update_source.py
        python -m build --wheel
        python -m pip install --no-index --find-links=dist pytsk3
    - name: Test Python module
      run: |
        python run_tests.py
